<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Fort</title>

<style>
:root{--preto:#0a0a0a;--vermelho:#c62828;--cinza:#f5f5f5;}
body{margin:0;font-family:Arial;background:var(--cinza);} 
header{background:var(--preto);color:white;padding:15px;display:flex;justify-content:space-between;}
.logo{color:var(--vermelho);font-weight:bold;font-size:22px;}
.hero{background:linear-gradient(135deg,var(--preto),var(--vermelho));color:white;text-align:center;padding:50px;}
.container{max-width:1200px;margin:auto;padding:20px;}
.sobre{background:white;padding:20px;border-radius:10px;margin-bottom:20px;}
.filtros{text-align:center;margin-bottom:20px;}
.filtros button{margin:5px;padding:8px;border:none;background:var(--preto);color:white;border-radius:5px;cursor:pointer;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.1);} 
.card img{width:100%;height:180px;object-fit:cover;}
.card h4{padding:10px;}
.card button{margin:10px;width:calc(100% - 20px);background:var(--vermelho);color:white;padding:10px;border:none;border-radius:5px;cursor:pointer;}
.adminBtn{position:fixed;bottom:20px;right:20px;background:var(--vermelho);color:white;padding:10px;border-radius:50px;cursor:pointer;}
#loginBox,#adminPanel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;width:300px;}
input,select{width:100%;margin:5px 0;padding:8px;}
</style>
</head>

<body>
<header><div class="logo">Portal Fort</div></header>

<section class="hero">
<h1>Loja mais completa do Brasil</h1>
<p>Ferramentas e soluções para sua empresa</p>
</section>

<div class="container">
<div class="sobre">
<h2>Sobre</h2>
<p>Portal Fort é referência em ferramentas e construção em Parauapebas.</p>
<p><strong>WhatsApp:</strong> (94) 99140-3367</p>
</div>

<div class="filtros">
<button onclick="filtrar('all')">Todos</button>
<button onclick="filtrar('ferramentas')">Ferramentas</button>
<button onclick="filtrar('construcao')">Construção</button>
<button onclick="filtrar('epis')">EPI's</button>
</div>

<div id="products" class="products"></div>
</div>

<div class="adminBtn" onclick="mostrarLogin()">Admin</div>

<div id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="adminPanel">
<h3>Cadastrar Produto</h3>
<input id="nome" placeholder="Nome">
<input type="file" id="file">
<select id="categoria">
<option value="ferramentas">Ferramentas</option>
<option value="construcao">Construção</option>
<option value="epis">EPI's</option>
</select>
<button onclick="addProduto()">Cadastrar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyAu5gIF2BBR6boxJ6mJIjMV71CbD-Ey0zk",
authDomain:"norte-distribuidora.firebaseapp.com",
projectId:"norte-distribuidora",
storageBucket:"norte-distribuidora.firebasestorage.app",
messagingSenderId:"225983951384",
appId:"1:225983951384:web:291a7b6096f11194e8096d"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const storage=firebase.storage();

function mostrarLogin(){document.getElementById('loginBox').style.display='block';}

function login(){
firebase.auth().signInWithEmailAndPassword(email.value,senha.value)
.then(()=>{loginBox.style.display='none';adminPanel.style.display='block';})
.catch(e=>alert(e.message));
}

function uploadImagem(file){
let ref=storage.ref('produtos/'+Date.now()+file.name);
return ref.put(file).then(()=>ref.getDownloadURL());
}

function addProduto(){
let file=document.getElementById('file').files[0];
if(!file)return alert('Selecione imagem');

uploadImagem(file)
.then(url=>db.collection('produtos').add({nome:nome.value,imagem:url,categoria:categoria.value}))
.then(()=>alert('Produto cadastrado'))
.catch(e=>alert(e.message));
}

let lista=[];
db.collection('produtos').onSnapshot(s=>{
lista=[];
s.forEach(doc=>lista.push(doc.data()));
render(lista);
});

function render(data){
let html='';
data.forEach(p=>{
html+=`<div class="card"><img src="${p.imagem}"><h4>${p.nome}</h4><button onclick="comprar('${p.nome}')">WhatsApp</button></div>`;
});
document.getElementById('products').innerHTML=html;
}

function filtrar(cat){if(cat==='all')return render(lista);render(lista.filter(p=>p.categoria===cat));}

function comprar(nome){window.open(`https://wa.me/5594991403367?text=Olá, tenho interesse no produto ${nome}`);}
</script>

</body>
</html>
