<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Fort</title>

<style>
:root {
    --branco:#ffffff;
    --preto:#000000;
    --vermelho:#c62828;
    --cinza:#f4f4f4;
}

body { margin:0; font-family:'Segoe UI', sans-serif; background:var(--cinza); color:var(--preto); } 

header { background: var(--preto); color:var(--branco); padding:20px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:15px; }
.logo img { height:60px; }
nav a { color:var(--branco); margin:0 10px; text-decoration:none; font-weight:bold; }
nav a:hover { color:var(--vermelho); }

.hero { background: linear-gradient(135deg,var(--preto) 60%, var(--vermelho)); color:var(--branco); padding:60px 20px; text-align:center; }
.hero h1 { font-size:36px; margin-bottom:10px; }

.container { max-width:1200px; margin:auto; padding:20px; }

.sobre { background:var(--branco); padding:20px; border-radius:10px; margin-bottom:20px; }

.filtros { margin-bottom:20px; text-align:center; }
.filtros button { margin:5px; padding:8px 12px; border:none; background:var(--preto); color:var(--branco); border-radius:5px; cursor:pointer; }
.filtros button:hover { background:var(--vermelho); }

.products { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }
.card { background:var(--branco); border-radius:12px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1); transition:0.3s; }
.card:hover { transform:translateY(-5px); }
.card img { width:100%; height:180px; object-fit:cover; }
.card h4 { padding:10px; color:var(--preto); }
.card button { margin:10px; width:calc(100% - 20px); background:var(--vermelho); color:var(--branco); border:none; padding:10px; border-radius:6px; cursor:pointer; }

.admin { position:fixed; bottom:20px; right:20px; background:var(--preto); color:var(--branco); padding:10px 15px; border-radius:50px; cursor:pointer; }

#loginBox, #adminPanel { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--branco); padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.2); width:300px; }

input, select { width:100%; padding:8px; margin:5px 0; }
button { width:100%; }
</style>
</head>

<body>

<header>
<div class="logo">
<img src="img/logo.png" alt="Portal Fort Logo">
<h2>Portal Fort</h2>
</div>
<nav>
<a href="#">Início</a>
<a href="#">Produtos</a>
<a href="#">Contato</a>
</nav>
</header>

<section class="hero">
<h1>Ferramentas e Máquinas Profissionais</h1>
<p>Qualidade, confiança e o melhor preço da região</p>
</section>

<div class="container">

<div class="sobre">
<h2>Sobre a Empresa</h2>
<p>A <strong>Portal Fort</strong> oferece ferramentas e produtos de qualidade, atendendo profissionais e empresas em Parauapebas - PA.</p>
</div>

<div class="filtros">
<button onclick="filtrar('all')">Todos</button>
<button onclick="filtrar('ferramentas')">Ferramentas</button>
<button onclick="filtrar('adesivos')">Adesivos</button>
<button onclick="filtrar('mangueiras')">Mangueiras</button>
<button onclick="filtrar('epis')">EPI's</button>
<button onclick="filtrar('eletricos')">Elétricos</button>
</div>

<div class="products" id="products"></div>

</div>

<div class="admin" onclick="mostrarLogin()">Admin</div>

<div id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="adminPanel">
<h3>Cadastrar Produto</h3>
<input id="nome" placeholder="Nome do Produto">
<input type="file" id="file">
<select id="categoria">
<option value="ferramentas">Ferramentas</option>
<option value="adesivos">Adesivos</option>
<option value="mangueiras">Mangueiras</option>
<option value="epis">EPI's</option>
<option value="eletricos">Elétricos</option>
</select>
<button onclick="addProduto()">Cadastrar</button>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// Config do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAu5gIF2BBR6boxJ6mJIjMV71CbD-Ey0zk",
  authDomain: "norte-distribuidora.firebaseapp.com",
  projectId: "norte-distribuidora",
  storageBucket: "norte-distribuidora.appspot.com",
  messagingSenderId: "225983951384",
  appId: "1:225983951384:web:a7c2c5a724cd945fe8096d",
  measurementId: "G-P2564XP9R6"
};

// Inicializa Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

// Login Admin
function login(){
  const emailInput = document.getElementById('email').value;
  const senhaInput = document.getElementById('senha').value;
  signInWithEmailAndPassword(auth, emailInput, senhaInput)
  .then(()=>{ 
    document.getElementById('adminPanel').style.display='block'; 
    document.getElementById('loginBox').style.display='none'; 
  })
  .catch(err=> alert("Erro no login: " + err.message));
}

function mostrarLogin(){ 
  document.getElementById('loginBox').style.display='block'; 
}

// Upload imagem
async function uploadImagem(file){
  const fileRef = ref(storage, 'produtos/' + Date.now() + '-' + file.name);
  await uploadBytes(fileRef, file);
  return getDownloadURL(fileRef);
}

// Adicionar produto
async function addProduto(){
  const file = document.getElementById('file').files[0];
  if(!file) return alert('Selecione uma imagem');

  const url = await uploadImagem(file);
  const nome = document.getElementById('nome').value;
  const categoria = document.getElementById('categoria').value;

  await addDoc(collection(db, 'produtos'), { nome, categoria, imagem: url });
  alert("Produto cadastrado!");
  document.getElementById('nome').value='';
  document.getElementById('file').value='';
}

// Render produtos
let lista = [];
onSnapshot(collection(db, 'produtos'), snapshot=>{
  lista = [];
  snapshot.forEach(doc=> lista.push(doc.data()));
  render(lista);
});

function render(data){
  let html='';
  data.forEach(p=>{
    html+=`
      <div class="card">
        <img src="${p.imagem}" alt="${p.nome}">
        <h4>${p.nome}</h4>
        <button onclick="comprar('${p.nome}')">WhatsApp Norte</button>
      </div>`;
  });
  document.getElementById('products').innerHTML = html;
}

function comprar(nome){
  window.open(`https://wa.me/5594991403367?text=Olá, tenho interesse no produto ${nome}`);
}

function filtrar(cat){
  if(cat==='all') return render(lista);
  render(lista.filter(p=>p.categoria===cat));
}
</script>

</body>
</html>
