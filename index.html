<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Fort - Loja de Ferramentas</title>

<style>
:root {
    --preto: #000000;
    --vermelho: #c62828;
    --branco: #ffffff;
}

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: var(--branco);
    color: var(--preto);
}

header {
    background: var(--preto);
    color: var(--branco);
    padding: 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}
.logo {
    display:flex;
    align-items:center;
    gap:15px;
}
.logo img {
    height:60px;
}
nav a {
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}
nav a:hover {
    color: var(--vermelho);
}

.hero {
    background: linear-gradient(135deg, var(--preto) 60%, var(--vermelho));
    color: var(--branco);
    padding:60px 20px;
    text-align:center;
}
.hero h1 {
    font-size:36px;
    margin-bottom:10px;
}

.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.sobre {
    background: var(--branco);
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.filtros {
    margin-bottom:20px;
    text-align:center;
}
.filtros button {
    margin:5px;
    padding:8px 12px;
    border:none;
    background: var(--preto);
    color:white;
    border-radius:5px;
    cursor:pointer;
}
.filtros button:hover {
    background: var(--vermelho);
    color: white;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}
.card {
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}
.card:hover {
    transform:translateY(-5px);
}
.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}
.card h4 {
    padding:10px;
    text-align:center;
}
.card button {
    margin:10px;
    width:calc(100% - 20px);
    background: var(--vermelho);
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
}

.admin {
    position:fixed;
    bottom:20px;
    right:20px;
    background: var(--preto);
    color:white;
    padding:10px 15px;
    border-radius:50px;
    cursor:pointer;
    z-index:1000;
}

#loginBox, #adminPanel {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    width:300px;
    z-index:1001;
}

input, select, button {
    width:100%;
    padding:8px;
    margin:5px 0;
}
button:hover {
    opacity:0.9;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="https://via.placeholder.com/60x60?text=Logo" alt="Logo">
<h2>Portal Fort</h2>
</div>
<nav>
<a href="#">Início</a>
<a href="#">Produtos</a>
<a href="#">Contato</a>
</nav>
</header>

<section class="hero">
<h1>Ferramentas e Materiais Profissionais</h1>
<p>Maior variedade em Parauapebas - PA</p>
</section>

<div class="container">

<div class="sobre">
<h2>Sobre a Empresa</h2>
<p>A <strong>Portal Fort</strong> oferece ferramentas, madeira, portas e materiais de construção com qualidade e confiança para empresas e residências.</p>
</div>

<div class="filtros">
<button onclick="filtrar('all')">Todos</button>
<button onclick="filtrar('madeira')">Madeira</button>
<button onclick="filtrar('porta')">Porta</button>
<button onclick="filtrar('ferramentas')">Ferramentas</button>
<button onclick="filtrar('construcao')">Construção</button>
</div>

<div class="products" id="products"></div>
</div>

<div class="admin" onclick="mostrarLogin()">Admin</div>

<div id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="adminPanel">
<h3>Cadastrar Produto</h3>
<input id="nome" placeholder="Nome do Produto">
<input type="file" id="file">
<select id="categoria">
<option value="madeira">Madeira</option>
<option value="porta">Porta</option>
<option value="ferramentas">Ferramentas</option>
<option value="construcao">Construção</option>
</select>
<button onclick="addProduto()">Cadastrar</button>
<p id="msg" style="color:green;"></p>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAu5gIF2BBR6boxJ6mJIjMV71CbD-Ey0zk",
  authDomain: "norte-distribuidora.firebaseapp.com",
  projectId: "norte-distribuidora",
  storageBucket: "norte-distribuidora.appspot.com",
  messagingSenderId: "225983951384",
  appId: "1:225983951384:web:a7c2c5a724cd945fe8096d",
  measurementId: "G-P2564XP9R6"
};

// Init Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// Login Admin
window.login = () => {
    const emailValue = document.getElementById('email').value;
    const senhaValue = document.getElementById('senha').value;

    signInWithEmailAndPassword(auth, emailValue, senhaValue)
    .then(() => {
        document.getElementById('loginBox').style.display='none';
        document.getElementById('adminPanel').style.display='block';
    })
    .catch(err => alert("Erro no login: " + err.message));
}

// Mostrar login
window.mostrarLogin = () => {
    document.getElementById('loginBox').style.display='block';
}

// Upload Produto
window.addProduto = async () => {
    const nome = document.getElementById('nome').value;
    const categoria = document.getElementById('categoria').value;
    const file = document.getElementById('file').files[0];

    if(!nome || !file) return alert('Preencha o nome e selecione uma imagem!');

    const storageRef = ref(storage, 'produtos/' + Date.now() + '-' + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, 'produtos'), { nome, categoria, imagem: url });

    document.getElementById('msg').innerText = "Produto cadastrado com sucesso!";
    document.getElementById('nome').value = '';
    document.getElementById('file').value = '';
}

// Listar produtos
let lista = [];
const produtosCol = collection(db, 'produtos');
onSnapshot(produtosCol, snapshot => {
    lista = [];
    snapshot.forEach(doc => lista.push(doc.data()));
    render(lista);
});

// Render produtos
function render(data){
    const container = document.getElementById('products');
    container.innerHTML = '';
    data.forEach(p => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `
        <img src="${p.imagem}" alt="${p.nome}">
        <h4>${p.nome}</h4>
        <button onclick="window.open('https://wa.me/5594991403367?text=Olá, tenho interesse no produto ${encodeURIComponent(p.nome)}')">WhatsApp</button>
        `;
        container.appendChild(card);
    });
}

// Filtros
window.filtrar = (cat) => {
    if(cat==='all') render(lista);
    else render(lista.filter(p => p.categoria === cat));
}
</script>

</body>
</html>
